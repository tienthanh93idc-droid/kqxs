name: Daily XSKT Scraper

on:
  schedule:
    # 09:35 UTC = 16:35 Vietnam Time
    - cron: '35 9 * * *'
  workflow_dispatch: # Cho phép bấm chạy thủ công

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Cho phép push code

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install axios cheerio

      - name: Run Scraper
        run: node scrape.js

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update XSKT data [skip ci]" && git push)
